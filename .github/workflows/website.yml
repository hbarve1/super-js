name: Website CI

# Deployment is handled by Vercel's Git integration (Root Directory
# superjs/apps/website). This workflow only validates the website builds, so
# breakage is caught on PRs before Vercel deploys main.

on:
  push:
    branches: [main]
    paths:
      - 'superjs/apps/website/**'
      - '.github/workflows/website.yml'
  pull_request:
    paths:
      - 'superjs/apps/website/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: superjs
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: superjs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint & build the website
        # Preload (after checkout, so the script exists) lifts Node's listener cap
        # and filters MaxListenersExceededWarning from nx's parallel task spawns.
        env:
          NODE_OPTIONS: --require ${{ github.workspace }}/superjs/scripts/ci-node-setup.cjs
        run: pnpm nx run-many -t typecheck lint build --projects=@superjs/website

      # Quality gate: Lighthouse runs `next start` against the built app and
      # asserts budgets. Accessibility & SEO are blocking (≥0.95); performance &
      # best-practices warn (3D hero perf varies). Lighthouse's accessibility
      # category runs axe-core, so this covers the a11y gate too.
      - name: Lighthouse CI (perf / a11y / SEO budgets)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./superjs/apps/website/lighthouserc.json
          temporaryPublicStorage: true
