name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'superjs/apps/website/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: superjs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: superjs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the Next.js app and bundles the Cloudflare Worker (.open-next/),
      # then deploys via wrangler. Needs CLOUDFLARE_API_TOKEN (Workers Scripts:
      # Edit) + CLOUDFLARE_ACCOUNT_ID.
      - name: Build & deploy (Cloudflare Workers / OpenNext)
        run: pnpm --filter @superjs/website run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
