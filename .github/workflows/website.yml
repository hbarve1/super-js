name: Website CI

# Deployment is handled by Vercel's Git integration (Root Directory
# superjs/apps/website). This workflow only validates the website builds, so
# breakage is caught on PRs before Vercel deploys main.

on:
  push:
    branches: [main]
    paths:
      - 'superjs/apps/website/**'
      - '.github/workflows/website.yml'
  pull_request:
    paths:
      - 'superjs/apps/website/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: superjs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: superjs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint & build the website
        run: pnpm nx run-many -t typecheck lint build --projects=@superjs/website
