name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  error-pages:
    name: Error-code reference pages (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check error-code pages
        run: node scripts/check-error-pages.mjs

  docs-build:
    name: Docs site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: superjs/pnpm-lock.yaml

      - name: Install dependencies
        run: cd superjs && pnpm install --frozen-lockfile

      - name: Validate grammar + parser fixtures
        run: node scripts/validate-grammar.mjs

      - name: Sync error-code pages
        run: node scripts/sync-error-pages.mjs

      - name: Build compiler (docgen check)
        run: cd superjs && pnpm nx build compiler

      - name: Check compat matrix
        run: node scripts/check-compat-matrix.mjs

      - name: Check benchmark results
        run: node scripts/check-bench-results.mjs

      - name: Check API docs
        run: node scripts/check-api-docs.mjs

      - name: Check docs internal links
        run: node scripts/check-docs-links.mjs

      - name: Assemble language spec
        run: node scripts/assemble-language-spec.mjs

      - name: Check language spec is committed
        run: git diff --exit-code specs/language.md

      - name: Build website (includes docs routes)
        run: cd superjs && pnpm nx build website

  superjs:
    name: SuperJS (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    defaults:
      run:
        working-directory: superjs
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          # pnpm 11 requires Node ≥22.13; use pnpm 9 on Node 20 (WS-A7 matrix).
          version: ${{ matrix.node-version == 20 && 9 || 11 }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: superjs/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, test, typecheck, and build
        env:
          NODE_OPTIONS: --require ${{ github.workspace }}/superjs/scripts/ci-node-setup.cjs
        run: pnpm nx run-many -t lint test typecheck build
