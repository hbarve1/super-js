name: VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'superjs/apps/vscode-extension/**'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    paths:
      - 'superjs/apps/vscode-extension/**'
      - '.github/workflows/vscode-extension.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: superjs/apps/vscode-extension

jobs:
  test:
    name: grammar tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npx vsce package --allow-missing-repository
        if: matrix.os == 'ubuntu-latest'
